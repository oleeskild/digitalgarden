<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 185">
  <defs>
    <clipPath id="glass">
      <rect x="14" y="13" width="252" height="102" rx="15"/>
    </clipPath>
  </defs>

  <!-- Cream window fill -->
  <rect x="5" y="4" width="270" height="118" rx="20" fill="#f5f0e6"/>

  <!-- Mountain scene, clipped to glass area -->
  <g clip-path="url(#glass)" fill="none" stroke="#263e22">
    <!-- Background / far foothills -->
    <path d="M14,109 C55,105 95,101 130,99 C160,97 185,95 215,93 C235,92 252,93 266,95"
          stroke-width="1" opacity="0.5"/>
    <!-- Main mountain ridge -->
    <path d="M14,102 C38,98 58,91 73,85 C86,80 94,83 105,79
             C116,75 128,77 141,73 C153,69 163,66 171,60
             C179,54 186,49 191,46 L197,46
             C201,47 207,52 214,58 C223,65 235,71 266,81"
          stroke-width="1.5"/>
    <!-- Survey marker post -->
    <line x1="197" y1="46" x2="197" y2="27" stroke-width="0.9"/>
    <!-- Marker top tick -->
    <line x1="194" y1="27" x2="200" y2="27" stroke-width="0.9"/>
    <!-- "1°" label -->
    <text x="202" y="27" font-family="Georgia,'Times New Roman',serif"
          font-size="10" fill="#263e22" dominant-baseline="middle">1°</text>
  </g>

  <!-- Frame borders (on top of mountains) -->
  <rect x="2" y="2" width="276" height="123" rx="22"
        fill="none" stroke="#263e22" stroke-width="2.5"/>
  <rect x="5" y="4" width="270" height="118" rx="20"
        fill="none" stroke="#263e22" stroke-width="2"/>
  <rect x="13" y="12" width="254" height="103" rx="15"
        fill="none" stroke="#263e22" stroke-width="1"/>

  <!-- Bottom mounting legs -->
  <rect x="24" y="124" width="15" height="30" rx="2"
        fill="none" stroke="#263e22" stroke-width="2.5"/>
  <rect x="241" y="124" width="15" height="30" rx="2"
        fill="none" stroke="#263e22" stroke-width="2.5"/>

  <!-- Bottom sill -->
  <line x1="0" y1="154" x2="280" y2="154" stroke="#263e22" stroke-width="2.5"/>
  <line x1="0" y1="158" x2="280" y2="158" stroke="#263e22" stroke-width="1"/>

  <!-- "the years" -->
  <text x="140" y="178" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="22" fill="#263e22">the years</text>
</svg>
