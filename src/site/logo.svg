    <line x1="94.3" y1="64.3" x2="88.7" y2="58.7"/>
    <line x1="96" y1="63.1" x2="89" y2="51"/>
    <line x1="97.9" y1="62.3" x2="95.9" y2="54.5"/>
    <line x1="100" y1="62" x2="100" y2="48"/>
    <line x1="102.1" y1="62.3" x2="104.1" y2="54.5"/>
    <line x1="104" y1="63.1" x2="111" y2="51"/>
    <line x1="105.7" y1="64.3" x2="111.3" y2="58.7"/>
    <line x1="106.9" y1="66" x2="119.1" y2="59"/>
    <line x1="107.7" y1="67.9" x2="115.5" y2="65.9"/>
