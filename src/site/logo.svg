  <!-- Inner border ellipse -->
  <ellipse cx="100" cy="70" rx="87" ry="57" fill="none" stroke="#2c3d1a" stroke-width="1.5"/>

  <!-- Taiwan silhouette, centered at (100, 70), ~20w x 38h -->
  <path d="M100,52 C104,51 108,53 110,57
           C111,61 111,66 110,71
           C109,76 108,81 107,85
           C105,88 102,90 100,90
           C98,90 95,88 93,85
           C91,81 90,75 90,69
           C89,63 89,58 92,55
           C95,51 98,52 100,52Z"
        fill="#2c3d1a"/>

  <!-- Left star (5-pt, R=4, r=1.6, centered at inner ellipse left edge x=13) -->
  <path d="M13,66 L13.9,68.7 L16.8,68.8 L14.5,70.5 L15.4,73.2
           L13,71.6 L10.7,73.2 L11.5,70.5 L9.2,68.8 L12.1,68.7Z"
        fill="#2c3d1a"/>

  <!-- Right star (mirror) -->
  <path d="M187,66 L186.1,68.7 L183.2,68.8 L185.5,70.5 L184.7,73.2
           L187,71.6 L189.4,73.2 L188.5,70.5 L190.8,68.8 L187.9,68.7Z"
        fill="#2c3d1a"/>

  <!-- "THE" -->
  <text x="100" y="31" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="17" font-weight="bold" fill="#2c3d1a" letter-spacing="5">THE</text>

  <!-- "YEARS" -->
  <text x="100" y="116" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="17" font-weight="bold" fill="#2c3d1a" letter-spacing="4">YEARS</text>
