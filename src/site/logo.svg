    <line x1="100" y1="78" x2="100" y2="92"/>
    <line x1="97.9" y1="77.7" x2="95.9" y2="85.5"/>
    <line x1="96" y1="76.9" x2="89" y2="89"/>
    <line x1="94.3" y1="75.7" x2="88.7" y2="81.3"/>
    <line x1="93.1" y1="74" x2="80.9" y2="81"/>
    <line x1="92.3" y1="72.1" x2="84.5" y2="74.1"/>
    <line x1="92" y1="70" x2="78" y2="70"/>
